<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 進度保留版 - 漫畫翻譯 & 嵌字工作站</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', 微軟正黑體, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 15px; color: #2c3e50; }
        
        .toolbar {
            background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 15px;
        }
        
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .btn-upload {
            border: 2px dashed #9b59b6; color: #9b59b6; background-color: white;
            padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-upload:hover { background-color: #f5eef8; }
        .btn-upload.yellow { border-color: #f39c12; color: #f39c12; }
        .btn-upload.yellow:hover { background-color: #fcf3e3; }
        
        .file-input-wrapper input[type=file] {
            font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer;
        }

        .btn-group { display: flex; gap: 10px; }
        button.action-btn {
            padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 14px; font-weight: bold; color: white; transition: opacity 0.2s;
        }
        button.action-btn:hover { opacity: 0.9; }
        .btn-yellow { background: #f39c12; }
        .btn-purple { background: #9b59b6; }
        
        .workspace { display: flex; gap: 20px; height: 75vh; }
        
        /* 側邊欄 */
        .page-list {
            width: 240px; background: white; padding: 10px; border-radius: 8px;
            overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .page-item {
            padding: 12px; margin-bottom: 6px; background: #f8f9fa; border-radius: 4px;
            cursor: pointer; font-size: 13px; border-left: 4px solid transparent;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .page-item.active { background: #e8f4fd; color: #1a73e8; font-weight: bold; border-left-color: #3498db; }
        .page-item.edited { background: #e8f8f0; border-left-color: #2ecc71; }
        
        /* 編輯主區塊 */
        .editor-panel {
            flex: 1; background: white; padding: 15px; border-radius: 8px; overflow: auto; 
            display: flex; flex-direction: column; align-items: center; position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        #image-container { position: relative; display: inline-block; user-select: none; }
        #manga-image { max-width: 100%; height: auto; display: none; pointer-events: none; }
        #draw-box {
            position: absolute; border: 2px dashed #e74c3c; background: rgba(255, 255, 255, 0.45);
            display: none; pointer-events: none; z-index: 5;
        }

        /* 嵌字框樣式 */
        .text-overlay {
            position: absolute; background-color: white; border: 1px dashed #3498db;
            box-sizing: border-box; padding: 2px; display: flex; flex-direction: column; z-index: 10;
        }
        .text-overlay textarea {
            width: 100%; height: 100%; border: none; resize: none; background: transparent;
            font-family: '微軟正黑體', -apple-system, sans-serif; font-size: 16px; font-weight: bold;
            color: black; outline: none; overflow: hidden; text-align: center; padding: 0; margin: 0;
        }
        .delete-btn {
            position: absolute; top: -22px; right: 0; background: #e74c3c; color: white;
            border: none; border-radius: 3px; cursor: pointer; font-size: 11px;
            padding: 2px 6px; display: none; z-index: 20;
        }
        .text-overlay:hover .delete-btn { display: block; }

        .status-msg { font-weight: bold; color: #2c3e50; margin-bottom: 5px; font-size: 16px; }
        .hint { color: #7f8c8d; font-size: 13px; margin-bottom: 10px; }
        
        /* 讀取遮罩與進度條 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 9999; display: none;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            border: 5px solid #f3f3f3; border-top: 5px solid #9b59b6; border-radius: 50%;
            width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .progress-container {
            width: 300px; height: 12px; background: #e0e0e0; border-radius: 6px;
            margin-top: 15px; overflow: hidden; display: none;
        }
        #progress-bar {
            height: 100%; width: 0%; background: #9b59b6; transition: width 0.2s ease;
        }
        #progress-percent {
            margin-top: 8px; font-weight: bold; color: #555; display: none;
        }
    </script>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h3 id="loading-text" style="color:#9b59b6; margin:0;">準備就緒...</h3>
        <div class="progress-container" id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="progress-percent">0%</div>
    </div>

    <div class="container">
        <header>
            <h2>漫畫翻譯 & 專業嵌字工作站</h2>
        </header>

        <div class="toolbar">
            <div class="file-input-wrapper">
                <button class="btn-upload">📁 載入新漫畫 (PDF/圖片)</button>
                <input type="file" id="file-selector" accept="application/pdf, image/*" multiple>
            </div>
            
            <div class="file-input-wrapper">
                <button class="btn-upload yellow">📂 載入專案存檔 (.json)</button>
                <input type="file" id="project-selector" accept=".json">
            </div>

            <div class="btn-group">
                <button class="action-btn btn-yellow" onclick="saveProject()">💾 儲存進度 (.json)</button>
                <button class="action-btn btn-purple" onclick="exportAsPDF()">📕 匯出 PDF</button>
            </div>
        </div>

        <div class="workspace">
            <div class="page-list" id="page-list">
                <div style="padding: 10px; text-align: center; color: #7f8c8d;">等待載入檔案...</div>
            </div>

            <div class="editor-panel">
                <div id="status-text" class="status-msg">狀態：準備就緒</div>
                <div class="hint">💡 提示：在對話框上「按住滑鼠左鍵拖曳」即可建立白色塗白框並輸入中文。重整網頁前請記得「儲存進度」。</div>
                
                <div id="image-container">
                    <img id="manga-image" alt="漫畫頁面">
                    <div id="draw-box"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pagesData = []; 
        let currentIndex = -1;

        // 繞過 GitHub Pages CORS 限制
        try {
            const workerCode = "importScripts('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js');";
            const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
            pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(workerBlob);
        } catch (e) {
            console.error("Worker 初始化失敗", e);
        }

        const container = document.getElementById('image-container');
        const drawBox = document.getElementById('draw-box');
        const img = document.getElementById('manga-image');
        let isDrawing = false; let startX, startY;

        window.addEventListener('resize', () => { if(currentIndex !== -1) renderOverlays(); });

        // --- 控制載入畫面的函數 ---
        function showLoading(showProgress = false, text = "載入中...") {
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('progress-container').style.display = showProgress ? 'block' : 'none';
            document.getElementById('progress-percent').style.display = showProgress ? 'block' : 'none';
            if(showProgress) {
                updateProgress(0, 1, text);
            } else {
                document.getElementById('loading-text').textContent = text;
            }
        }

        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function updateProgress(current, total, text) {
            const percent = Math.round((current / total) * 100);
            document.getElementById('loading-text').textContent = text;
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').textContent = percent + '%';
        }

        // --- 載入新漫畫 (PDF/圖片) ---
        document.getElementById('file-selector').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            showLoading(true, "準備解析...");
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            pagesData = []; currentIndex = -1;

            for (const file of files) {
                if (file.type === 'application/pdf') {
                    try {
                        const buffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
                        const totalPages = pdf.numPages;

                        for (let i = 1; i <= totalPages; i++) {
                            updateProgress(i, totalPages, `正在拆解 PDF: 第 ${i} / ${totalPages} 頁`);
                            await new Promise(r => setTimeout(r, 10));

                            const page = await pdf.getPage(i);
                            const viewport = page.getViewport({ scale: 2.0 }); 
                            const canvas = document.createElement('canvas
