<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 完美相容版 - 漫畫翻譯 & 嵌字工作站</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', 微軟正黑體, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 15px; color: #2c3e50; }
        
        .toolbar {
            background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 15px;
        }
        
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .btn-upload {
            border: 2px dashed #9b59b6; color: #9b59b6; background-color: white;
            padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-upload:hover { background-color: #f5eef8; }
        .file-input-wrapper input[type=file] {
            font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer;
        }

        .btn-group { display: flex; gap: 10px; }
        button.action-btn {
            padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 14px; font-weight: bold; color: white; transition: opacity 0.2s;
        }
        button.action-btn:hover { opacity: 0.9; }
        .btn-blue { background: #3498db; }
        .btn-purple { background: #9b59b6; }
        
        .workspace { display: flex; gap: 20px; height: 75vh; }
        
        /* 側邊欄 */
        .page-list {
            width: 240px; background: white; padding: 10px; border-radius: 8px;
            overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .page-item {
            padding: 12px; margin-bottom: 6px; background: #f8f9fa; border-radius: 4px;
            cursor: pointer; font-size: 13px; border-left: 4px solid transparent;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .page-item.active { background: #e8f4fd; color: #1a73e8; font-weight: bold; border-left-color: #3498db; }
        .page-item.edited { background: #e8f8f0; border-left-color: #2ecc71; }
        
        /* 編輯主區塊 */
        .editor-panel {
            flex: 1; background: white; padding: 15px; border-radius: 8px; overflow: auto; 
            display: flex; flex-direction: column; align-items: center; position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        #image-container { position: relative; display: inline-block; user-select: none; }
        #manga-image { max-width: 100%; height: auto; display: none; pointer-events: none; }
        #draw-box {
            position: absolute; border: 2px dashed #e74c3c; background: rgba(255, 255, 255, 0.45);
            display: none; pointer-events: none; z-index: 5;
        }

        /* 嵌字框樣式 */
        .text-overlay {
            position: absolute; background-color: white; border: 1px dashed #3498db;
            box-sizing: border-box; padding: 2px; display: flex; flex-direction: column; z-index: 10;
        }
        .text-overlay textarea {
            width: 100%; height: 100%; border: none; resize: none; background: transparent;
            font-family: '微軟正黑體', -apple-system, sans-serif; font-size: 16px; font-weight: bold;
            color: black; outline: none; overflow: hidden; text-align: center; padding: 0; margin: 0;
        }
        .delete-btn {
            position: absolute; top: -22px; right: 0; background: #e74c3c; color: white;
            border: none; border-radius: 3px; cursor: pointer; font-size: 11px;
            padding: 2px 6px; display: none; z-index: 20;
        }
        .text-overlay:hover .delete-btn { display: block; }

        .status-msg { font-weight: bold; color: #2c3e50; margin-bottom: 5px; font-size: 16px; }
        .hint { color: #7f8c8d; font-size: 13px; margin-bottom: 10px; }
        
        /* 讀取遮罩 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 9999; display: none;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            border: 5px solid #f3f3f3; border-top: 5px solid #9b59b6; border-radius: 50%;
            width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h3 id="loading-text" style="color:#9b59b6;">正在解析 PDF 檔案環境...</h3>
    </div>

    <div class="container">
        <header>
            <h2>漫畫翻譯 & 專業嵌字工作站</h2>
        </header>

        <div class="toolbar">
            <div class="file-input-wrapper">
                <button class="btn-upload">📁 選擇檔案 (支援 PDF 或多張圖片)</button>
                <input type="file" id="file-selector" accept="application/pdf, image/*" multiple>
            </div>
            
            <div class="btn-group">
                <button class="action-btn btn-purple" onclick="exportAsPDF()">📕 匯出完美 PDF 檔</button>
            </div>
        </div>

        <div class="workspace">
            <div class="page-list" id="page-list">
                <div style="padding: 10px; text-align: center; color: #7f8c8d;">等待載入檔案...</div>
            </div>

            <div class="editor-panel">
                <div id="status-text" class="status-msg">狀態：準備就緒</div>
                <div class="hint">💡 提示：在對話框上「按住滑鼠左鍵拖曳」即可建立白色塗白框並輸入中文。</div>
                
                <div id="image-container">
                    <img id="manga-image" alt="漫畫頁面">
                    <div id="draw-box"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pagesData = []; 
        let currentIndex = -1;

        // 【大招：繞過 GitHub Pages CORS 限制】
        // 使用 Blob URL 將外部 Worker 引入，這樣瀏覽器就不會阻擋非同步解析
        try {
            const workerCode = "importScripts('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js');";
            const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
            pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(workerBlob);
        } catch (e) {
            console.error("Worker 初始化失敗，切換至備用模式", e);
        }

        const container = document.getElementById('image-container');
        const drawBox = document.getElementById('draw-box');
        const img = document.getElementById('manga-image');
        let isDrawing = false;
        let startX, startY;

        // 監聽視窗縮放，確保文字框位置不歪掉
        window.addEventListener('resize', () => { if(currentIndex !== -1) renderOverlays(); });

        document.getElementById('file-selector').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const loadingOverlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');
            loadingOverlay.style.display = 'flex';

            // 排序檔案
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            pagesData = [];
            currentIndex = -1;

            for (const file of files) {
                if (file.type === 'application/pdf') {
                    loadingText.textContent = `解析中 PDF: ${file.name}`;
                    try {
                        const buffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const viewport = page.getViewport({ scale: 2.0 }); // 2倍解析度確保清晰
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;

                            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                            pagesData.push({
                                name: `${file.name.replace('.pdf', '')}_P${i}`,
                                url: canvas.toDataURL('image/png'), // 全面改用穩定的 PNG 格式
                                overlays: []
                            });
                        }
                    } catch (err) {
                        alert("PDF 解析出錯，請確認檔案是否受保護或損毀：" + err.message);
                    }
                } else {
                    pagesData.push({
                        name: file.name,
                        url: URL.createObjectURL(file),
                        overlays: []
                    });
                }
            }

            renderPageList();
            if(pagesData.length > 0) loadPage(0);
            loadingOverlay.style.display = 'none';
        });

        function renderPageList() {
            const list = document.getElementById('page-list');
            list.innerHTML = '';
            pagesData.forEach((page, index) => {
                const item = document.createElement('div');
                item.className = 'page-item' + (index === currentIndex ? ' active' : '') + (page.overlays.length > 0 ? ' edited' : '');
                item.textContent = `📄 ${page.name}`;
                item.onclick = () => loadPage(index);
                list.appendChild(item);
            });
        }

        function loadPage(index) {
            if (index < 0 || index >= pagesData.length) return;
            saveCurrentOverlays(); 

            currentIndex = index;
            document.getElementById('status-text').textContent = `正在編輯：${pagesData[index].name} (${index + 1} / ${pagesData.length})`;
            
            renderPageList();

            img.src = pagesData[index].url;
            img.style.display = 'block';

            img.onload = () => { renderOverlays(); };
        }

        // 把【原始像素】轉回【當前網頁網格】渲染在畫面
        function renderOverlays() {
            document.querySelectorAll('.text-overlay').forEach(el => el.remove());
            if (currentIndex === -1) return;

            const scaleX = img.clientWidth / img.naturalWidth;
            const scaleY = img.clientHeight / img.naturalHeight;

            pagesData[currentIndex].overlays.forEach((data) => {
                createOverlayElement(data.x * scaleX, data.y * scaleY, data.w * scaleX, data.h * scaleY, data.text);
            });
        }

        function saveCurrentOverlays() {
            if (currentIndex === -1 || !img.clientWidth) return;

            const scaleX = img.naturalWidth / img.clientWidth;
            const scaleY = img.naturalHeight / img.clientHeight;
            const elements = document.querySelectorAll('.text-overlay');
            const currentOverlays = [];

            elements.forEach(el => {
                currentOverlays.push({
                    x: parseFloat(el.style.left) * scaleX,
                    y: parseFloat(el.style.top) * scaleY,
                    w: parseFloat(el.style.width) * scaleX,
                    h: parseFloat(el.style.height) * scaleY,
                    text: el.querySelector('textarea').value
                });
            });

            pagesData[currentIndex].overlays = currentOverlays;
        }

        // 滑鼠手勢畫框
        container.addEventListener('mousedown', (e) => {
            if (currentIndex === -1 || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
            const rect = container.getBoundingClientRect();
            startX = e.clientX - rect.left; startY = e.clientY - rect.top;
            isDrawing = true;
            drawBox.style.left = startX + 'px'; drawBox.style.top = startY + 'px';
            drawBox.style.width = '0px'; drawBox.style.height = '0px'; drawBox.style.display = 'block';
        });

        container.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = container.getBoundingClientRect();
            const currentX = e.clientX - rect.left; const currentY = e.clientY - rect.top;
            drawBox.style.left = Math.min(startX, currentX) + 'px';
            drawBox.style.top = Math.min(startY, currentY) + 'px';
            drawBox.style.width = Math.abs(currentX - startX) + 'px';
            drawBox.style.height = Math.abs(currentY - startY) + 'px';
        });

        container.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            isDrawing = false; drawBox.style.display = 'none';
            const rect = container.getBoundingClientRect();
            const endX = e.clientX - rect.left; const endY = e.clientY - rect.top;
            
            const x = Math.min(startX, endX); const y = Math.min(startY, endY);
            const w = Math.abs(endX - startX); const h = Math.abs(endY - startY);

            if (w > 15 && h > 15) {
                createOverlayElement(x, y, w, h, '');
                saveCurrentOverlays();
                renderPageList();
            }
        });

        function createOverlayElement(x, y, w, h, text) {
            const overlay = document.createElement('div');
            overlay.className = 'text-overlay';
            overlay.style.left = x + 'px'; overlay.style.top = y + 'px';
            overlay.style.width = w + 'px'; overlay.style.height = h + 'px';

            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn'; delBtn.textContent = '刪除';
            delBtn.onclick = () => { overlay.remove(); saveCurrentOverlays(); renderPageList(); };

            const textarea = document.createElement('textarea');
            textarea.value = text; textarea.placeholder = "請輸入中文...";
            textarea.oninput = () => saveCurrentOverlays();

            overlay.appendChild(delBtn); overlay.appendChild(textarea);
            container.appendChild(overlay);
        }

        // 核心底層：高精度畫布燒錄引擎
        function generateCanvasImage(page) {
            return new Promise((resolve) => {
                const imgObj = new Image();
                imgObj.src = page.url;
                imgObj.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = imgObj.naturalWidth; canvas.height = imgObj.naturalHeight;

                    // 1. 畫底圖
                    ctx.drawImage(imgObj, 0, 0);

                    // 2. 塗白與嵌字
                    page.overlays.forEach(overlay => {
                        ctx.fillStyle = 'white';
                        ctx.fillRect(overlay.x, overlay.y, overlay.w, overlay.h);

                        if (!overlay.text.trim()) return;

                        const lines = overlay.text.split('\n');
                        let fontSize = overlay.w * 0.13; 
                        if (fontSize * lines.length > overlay.h) fontSize = overlay.h / (lines.length + 0.4);
                        fontSize = Math.max(14, Math.min(fontSize, 45));

                        ctx.fillStyle = 'black';
                        ctx.font = `bold ${fontSize}px '微軟正黑體', sans-serif`;
                        ctx.textAlign = 'center'; ctx.textBaseline = 'top';

                        const lineHeight = fontSize * 1.3;
                        const totalHeight = lines.length * lineHeight;
                        const startY = overlay.y + (overlay.h - totalHeight) / 2;

                        lines.forEach((line, index) => {
                            ctx.fillText(line, overlay.x + overlay.w / 2, startY + (index * lineHeight));
                        });
                    });

                    // 導出純粹的 PNG DataURL，避免跟格式衝突
                    resolve(canvas.toDataURL('image/png'));
                };
            });
        }

        // 【打包匯出：修復版】
        async function exportAsPDF() {
            saveCurrentOverlays();
            if (pagesData.length === 0) return alert("請先載入檔案！");
            
            const loadingOverlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');
            loadingOverlay.style.display = 'flex';
            
            const { jsPDF } = window.jspdf;
            // 建立乾淨的 PDF 物件
            const pdf = new jsPDF({ orientation: 'p', unit: 'px', compress: true });
            pdf.deletePage(1); // 刪除預設頁

            for (let i = 0; i < pagesData.length; i++) {
                loadingText.textContent = `打包 PDF 中: 第 ${i+1} / ${pagesData.length} 頁`;
                
                const dataUrl = await generateCanvasImage(pagesData[i]);
                
                // 獲取圖片真實長寬，防止壓縮變形
                const checkImg = new Image();
                checkImg.src = dataUrl;
                await new Promise(r => checkImg.onload = r);
                
                const orient = checkImg.width > checkImg.height ? 'l' : 'p';
                
                // 精準建立與原圖寬高一致的頁面，改用相容性極高的 'PNG' 格式寫入
                pdf.addPage([checkImg.width, checkImg.height], orient);
                pdf.addImage(dataUrl, 'PNG', 0, 0, checkImg.width, checkImg.height, undefined, 'FAST');
            }
            
            loadingText.textContent = `封裝檔案中...`;
            pdf.save("Manga_Translated.pdf");
            
            loadingOverlay.style.display = 'none';
            document.getElementById('status-text').textContent = "✅ PDF 成功匯出！";
        }
    </script>
</body>
</html>
