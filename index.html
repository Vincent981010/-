<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全功能免費漫畫翻譯 & 嵌字工作站 (支援 PDF)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // 設定 PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        body { font-family: 'Segoe UI', 微軟正黑體, sans-serif; background-color: #e9ecef; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 15px; }
        header h2 { margin-bottom: 5px; color: #2c3e50; }
        
        .toolbar {
            background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 15px;
        }
        
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .btn-upload {
            border: 2px dashed #8e44ad; color: #8e44ad; background-color: white;
            padding: 8px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-upload:hover { background-color: #f5eef8; }
        .file-input-wrapper input[type=file] {
            font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer;
        }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button.action-btn {
            padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 14px; font-weight: bold; color: white; transition: background 0.2s;
        }
        .btn-blue { background: #3498db; } .btn-blue:hover { background: #2980b9; }
        .btn-green { background: #2ecc71; } .btn-green:hover { background: #27ae60; }
        .btn-purple { background: #9b59b6; } .btn-purple:hover { background: #8e44ad; }
        
        .workspace { display: flex; gap: 20px; height: 75vh; }
        
        .page-list {
            width: 220px; background: white; padding: 10px; border-radius: 8px;
            overflow-y: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .page-item {
            padding: 12px; margin-bottom: 6px; background: #f8f9fa; border-radius: 4px;
            cursor: pointer; text-align: left; font-size: 13px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; border-left: 3px solid transparent;
        }
        .page-item.active { background: #e8f4fd; color: #1a73e8; font-weight: bold; border-left-color: #3498db; }
        .page-item.edited { background: #e8f8f0; border-left-color: #2ecc71; }
        .page-item.active.edited { background: #e8f8f0; color: #27ae60; border-left-color: #2ecc71; }
        
        .editor-panel {
            flex: 1; background: white; padding: 15px; border-radius: 8px; overflow: auto; 
            display: flex; flex-direction: column; align-items: center; position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        #image-container { position: relative; display: inline-block; user-select: none; }
        #manga-image { max-width: 100%; height: auto; display: none; pointer-events: none; }
        #draw-box {
            position: absolute; border: 2px dashed #e74c3c; background: rgba(255, 255, 255, 0.4);
            display: none; pointer-events: none;
        }

        .text-overlay {
            position: absolute; background-color: white; border: 1px solid #1a73e8;
            box-sizing: border-box; padding: 2px; display: flex; flex-direction: column;
        }
        .text-overlay textarea {
            width: 100%; height: 100%; border: none; resize: none; background: transparent;
            font-family: '微軟正黑體', sans-serif; font-size: 15px; font-weight: bold;
            color: black; outline: none; overflow: hidden; text-align: center; padding: 0; margin: 0;
        }
        .delete-btn {
            position: absolute; top: -22px; right: 0; background: #e74c3c; color: white;
            border: none; border-radius: 3px; cursor: pointer; font-size: 11px;
            padding: 1px 5px; display: none; z-index: 10;
        }
        .text-overlay:hover .delete-btn { display: block; }

        .hint { color: #7f8c8d; font-size: 13px; margin-bottom: 10px; text-align: center; width: 100%; }
        .status-msg { font-weight: bold; color: #8e44ad; margin-bottom: 5px; }
        
        /* 載入遮罩 */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; display: none;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            border: 6px solid #f3f3f3; border-top: 6px solid #8e44ad; border-radius: 50%;
            width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h2 id="loading-text" style="color:#8e44ad;">正在解析 PDF 檔案...</h2>
    </div>

    <div class="container">
        <header>
            <h2>📕 免費漫畫翻譯 & 嵌字工作站 (支援 PDF 解析)</h2>
        </header>

        <div class="toolbar">
            <div class="file-input-wrapper">
                <button class="btn-upload">📁 載入漫畫 (支援整本 PDF 或多張圖片)</button>
                <input type="file" id="image-upload" accept="application/pdf, image/*" multiple>
            </div>
            
            <div class="btn-group">
                <button class="action-btn btn-blue" onclick="exportCurrentImage()">💾 下載單頁圖片</button>
                <button class="action-btn btn-green" onclick="exportAllImages()">📥 批量下載所有圖片</button>
                <button class="action-btn btn-purple" onclick="exportAsPDF()">📕 匯出成全新 PDF 檔</button>
            </div>
        </div>

        <div class="workspace">
            <div class="page-list" id="page-list">
                <div style="padding: 10px; text-align: center; color: #7f8c8d;">請先上傳 PDF 或圖片</div>
            </div>

            <div class="editor-panel">
                <div id="status-text" class="status-msg">目前狀態：等待上傳檔案</div>
                <div class="hint">💡 使用滑鼠在對話框上「點擊並拖曳」畫出方框，即可自動塗白並輸入中文。</div>
                
                <div id="image-container">
                    <img id="manga-image" alt="漫畫預覽">
                    <div id="draw-box"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pagesData = []; 
        let currentIndex = -1;

        const container = document.getElementById('image-container');
        const drawBox = document.getElementById('draw-box');
        let isDrawing = false;
        let startX, startY;

        // --- 1. 處理上傳 (支援 PDF 拆解與圖片) ---
        document.getElementById('image-upload').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            // 啟動 Loading 畫面
            const loadingOverlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');
            loadingOverlay.style.display = 'flex';

            files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

            // 清空舊資料
            pagesData = [];
            currentIndex = -1;

            for (const file of files) {
                if (file.type === 'application/pdf') {
                    loadingText.textContent = `正在解析 PDF：${file.name} ...`;
                    await processPDF(file);
                } else {
                    pagesData.push({
                        name: file.name,
                        url: URL.createObjectURL(file),
                        overlays: []
                    });
                }
            }

            renderPageList();
            if(pagesData.length > 0) loadPage(0);
            
            loadingOverlay.style.display = 'none';
            document.getElementById('status-text').textContent = "檔案載入完成！";
        });

        // 核心：將 PDF 解析成高畫質圖片陣列
        async function processPDF(file) {
            const fileReader = new FileReader();
            return new Promise((resolve) => {
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    const numPages = pdf.numPages;

                    for (let i = 1; i <= numPages; i++) {
                        const page = await pdf.getPage(i);
                        // 設定 scale 為 2.0，將 PDF 解析為高解析度圖片確保文字清晰
                        const viewport = page.getViewport({ scale: 2.0 }); 
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                        
                        // 轉換為 JPEG DataURL
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                        pagesData.push({
                            name: `${file.name.replace('.pdf', '')}_第${i}頁`,
                            url: dataUrl,
                            overlays: []
                        });
                    }
                    resolve();
                };
                fileReader.readAsArrayBuffer(file);
            });
        }

        // --- 以下為 UI 與繪圖邏輯 (與先前一致) ---
        function renderPageList() {
            const list = document.getElementById('page-list');
            list.innerHTML = '';
            pagesData.forEach((page, index) => {
                const item = document.createElement('div');
                item.className = 'page-item';
                if(page.overlays.length > 0) item.className += ' edited';
                item.id = `page-item-${index}`;
                item.textContent = `📄 ${page.name}`;
                item.onclick = () => loadPage(index);
                list.appendChild(item);
            });
        }

        function loadPage(index) {
            if (index < 0 || index >= pagesData.length) return;
            saveCurrentOverlays(); 

            currentIndex = index;
            const page = pagesData[index];

            document.querySelectorAll('.page-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });

            document.getElementById('status-text').textContent = `正在編輯：${page.name} (${index + 1} / ${pagesData.length})`;

            const img = document.getElementById('manga-image');
            img.src = page.url;
            img.style.display = 'block';

            document.querySelectorAll('.text-overlay').forEach(el => el.remove());
            
            img.onload = () => {
                const scaleX = img.width / img.naturalWidth;
                const scaleY = img.height / img.naturalHeight;

                page.overlays.forEach((data) => {
                    createOverlayElement(data.x * scaleX, data.y * scaleY, data.w * scaleX, data.h * scaleY, data.text);
                });
            };
        }

        function saveCurrentOverlays() {
            if (currentIndex === -1) return;
            const img = document.getElementById('manga-image');
            if (!img.width || !img.naturalWidth) return; 

            const scaleX = img.naturalWidth / img.width;
            const scaleY = img.naturalHeight / img.height;
            const elements = document.querySelectorAll('.text-overlay');
            const currentOverlays = [];

            elements.forEach(el => {
                currentOverlays.push({
                    x: parseFloat(el.style.left) * scaleX,
                    y: parseFloat(el.style.top) * scaleY,
                    w: parseFloat(el.style.width) * scaleX,
                    h: parseFloat(el.style.height) * scaleY,
                    text: el.querySelector('textarea').value
                });
            });

            pagesData[currentIndex].overlays = currentOverlays;
            const listItem = document.getElementById(`page-item-${currentIndex}`);
            if (listItem) {
                if (currentOverlays.length > 0) listItem.classList.add('edited');
                else listItem.classList.remove('edited');
            }
        }

        container.addEventListener('mousedown', (e) => {
            if (currentIndex === -1 || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
            const rect = container.getBoundingClientRect();
            startX = e.clientX - rect.left; startY = e.clientY - rect.top;
            isDrawing = true;
            drawBox.style.left = startX + 'px'; drawBox.style.top = startY + 'px';
            drawBox.style.width = '0px'; drawBox.style.height = '0px'; drawBox.style.display = 'block';
        });

        container.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = container.getBoundingClientRect();
            const currentX = e.clientX - rect.left; const currentY = e.clientY - rect.top;
            drawBox.style.left = Math.min(startX, currentX) + 'px';
            drawBox.style.top = Math.min(startY, currentY) + 'px';
            drawBox.style.width = Math.abs(currentX - startX) + 'px';
            drawBox.style.height = Math.abs(currentY - startY) + 'px';
        });

        container.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            isDrawing = false; drawBox.style.display = 'none';
            const rect = container.getBoundingClientRect();
            const endX = e.clientX - rect.left; const endY = e.clientY - rect.top;
            const x = Math.min(startX, endX); const y = Math.min(startY, endY);
            const w = Math.abs(endX - startX); const h = Math.abs(endY - startY);

            if (w > 20 && h > 20) {
                createOverlayElement(x, y, w, h, '');
                saveCurrentOverlays();
            }
        });

        function createOverlayElement(x, y, w, h, text) {
            const overlay = document.createElement('div');
            overlay.className = 'text-overlay';
            overlay.style.left = x + 'px'; overlay.style.top = y + 'px';
            overlay.style.width = w + 'px'; overlay.style.height = h + 'px';

            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn'; delBtn.textContent = '刪除';
            delBtn.onclick = () => { overlay.remove(); saveCurrentOverlays(); };

            const textarea = document.createElement('textarea');
            textarea.value = text; textarea.placeholder = "請輸入翻譯...";
            textarea.oninput = () => saveCurrentOverlays();

            overlay.appendChild(delBtn); overlay.appendChild(textarea);
            container.appendChild(overlay);
        }

        // --- 匯出核心引擎 (合成底圖與文字) ---
        function generateCanvasImage(page) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = page.url;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;

                    ctx.drawImage(img, 0, 0);

                    page.overlays.forEach(overlay => {
                        ctx.fillStyle = 'white';
                        ctx.fillRect(overlay.x, overlay.y, overlay.w, overlay.h);

                        if (overlay.text.trim() === '') return;

                        const lines = overlay.text.split('\n');
                        let fontSize = overlay.w * 0.12; 
                        if (fontSize * lines.length > overlay.h) fontSize = overlay.h / (lines.length + 0.5);
                        fontSize = Math.max(14, Math.min(fontSize, 50));

                        ctx.fillStyle = 'black';
                        ctx.font = `bold ${fontSize}px '微軟正黑體', sans-serif`;
                        ctx.textAlign = 'center'; ctx.textBaseline = 'top';

                        const lineHeight = fontSize * 1.3;
                        const totalTextHeight = lines.length * lineHeight;
                        const startY = overlay.y + (overlay.h - totalTextHeight) / 2;

                        lines.forEach((line, index) => {
                            ctx.fillText(line, overlay.x + overlay.w / 2, startY + (index * lineHeight));
                        });
                    });

                    canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.95);
                };
                img.onerror = () => reject(new Error("圖片載入失敗"));
            });
        }

        function exportCurrentImage() {
            if (currentIndex === -1) return alert("請先上傳！");
            saveCurrentOverlays();
            generateCanvasImage(pagesData[currentIndex]).then(blob => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Translated_${pagesData[currentIndex].name}.jpg`;
                link.click();
            });
        }

        async function exportAllImages() {
            saveCurrentOverlays(); 
            if (pagesData.length === 0) return alert("沒有資料！");
            const check = confirm("即將批量下載整本漫畫。請允許瀏覽器下載多個檔案。");
            if (!check) return;

            for (let i = 0; i < pagesData.length; i++) {
                document.getElementById('status-text').textContent = `⚡ 打包下載圖片：${i+1}/${pagesData.length}`;
                const blob = await generateCanvasImage(pagesData[i]);
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Translated_${pagesData[i].name}.jpg`;
                link.click();
                await new Promise(
