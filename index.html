<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>漫畫工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <input type="file" id="fileInput" accept="application/pdf,image/*" multiple>
    <button onclick="processFiles()">開始處理</button>
    <div id="debug" style="color: red;"></div>
    <div id="container" style="position: relative; margin-top: 20px;"></div>

    <script>
        // 設定 worker 路徑
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        async function processFiles() {
            const input = document.getElementById('fileInput');
            const debug = document.getElementById('debug');
            const container = document.getElementById('container');
            
            if (input.files.length === 0) return alert("請選取檔案");
            debug.innerText = "處理中...";

            try {
                for (let file of input.files) {
                    if (file.type === 'application/pdf') {
                        const buffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const vp = page.getViewport({scale: 1.5});
                            const canvas = document.createElement('canvas');
                            canvas.height = vp.height;
                            canvas.width = vp.width;
                            await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
                            
                            const img = new Image();
                            img.src = canvas.toDataURL();
                            img.style.display = "block";
                            img.style.marginBottom = "20px";
                            container.appendChild(img);
                        }
                    } else {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = new Image();
                            img.src = e.target.result;
                            img.style.display = "block";
                            img.style.marginBottom = "20px";
                            container.appendChild(img);
                        };
                        reader.readAsDataURL(file);
                    }
                }
                debug.innerText = "載入完成";
            } catch (err) {
                debug.innerText = "錯誤: " + err.message;
            }
        }
    </script>
</body>
</html>
